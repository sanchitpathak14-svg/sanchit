<!DOCTYPE html>
<html>
<head>
<title>A small question</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
margin:0;
overflow:hidden;
}

/* Bigger box */

.box{
background:rgba(0,0,0,0.35);
padding:60px;
border-radius:25px;
max-width:520px;
position:relative;
z-index:2;
}

/* Bigger text */

p{
font-size:22px;
line-height:1.7;
}

h2{
font-size:32px;
margin-bottom:20px;
}

/* Buttons side by side */

.buttons{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
position:relative;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:12px;
cursor:pointer;
transition:0.25s;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:white;
color:black;
position:relative;
}

#celebration{
font-size:40px;
margin-top:25px;
display:none;
}

/* floating hearts */

.heart{
position:fixed;
animation:floatUp 6s linear infinite;
pointer-events:none;
}

@keyframes floatUp{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="box">

<h2>Sushrita, a small question for you…</h2>

<p>
I know I made mistakes and probably annoyed you more than I should have 🙈  
I'm really sorry.  
I can't change the past… but I promise I'll do better from now on.
<br><br>
Can you forgive me? 🥺❤️
</p>

<div class="buttons">
<button id="yes" onclick="accepted()">YES ❤️</button>
<button id="no" onclick="move()">🫣 No</button>
</div>

<p id="response"></p>

<div id="celebration">
🎉🥳💖🎊✨💃
</div>

</div>

<script>

let noClicks = 0;

function move(){

noClicks++;

let btn = document.getElementById("no");

/* first 2 clicks: move randomly nearby */

if(noClicks < 3){

let x = (Math.random()*120)-60;
let y = (Math.random()*40)-20;

btn.style.transform = `translate(${x}px,${y}px)`;

}

/* 3rd click: move next to YES and trigger YES */

if(noClicks === 3){

btn.style.transform = "translate(-40px,0px)";

setTimeout(()=>{
accepted();
},500);

}

}

function accepted(){

document.getElementById("response").innerHTML =
"Wait wait… you said yes? 😳❤️<br>Okay… I promise to use my brain next time 😅";

document.getElementById("celebration").style.display = "block";

document.getElementById("yes").style.display="none";
document.getElementById("no").style.display="none";

}

/* floating hearts */

setInterval(function(){

const heart = document.createElement("div");
heart.className = "heart";

const hearts = ["❤️","💓","💖","💗","💕"];
heart.innerHTML = hearts[Math.floor(Math.random()*hearts.length)];

heart.style.left = Math.random()*100 + "vw";
heart.style.fontSize = (20 + Math.random()*20) + "px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},500);

</script>

</body>
</html>
