<!DOCTYPE html>
<html>
<head>
<title>A small question</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
margin:0;
overflow:hidden;
}

.box{
background:rgba(0,0,0,0.35);
padding:40px;
border-radius:20px;
max-width:380px;
position:relative;
z-index:2;
}

p{
font-size:18px;
line-height:1.6;
}

button{
padding:12px 25px;
font-size:16px;
border:none;
border-radius:10px;
margin:10px;
cursor:pointer;
transition:0.2s;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:white;
color:black;
}

#celebration{
font-size:35px;
margin-top:20px;
display:none;
}

/* floating hearts */

.heart{
position:fixed;
animation:floatUp 6s linear infinite;
pointer-events:none;
}

@keyframes floatUp{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="box">

<h2>Sushrita, a small question for you…</h2>

<p>
I know I made mistakes and probably annoyed you more than I should have 🙈  
I'm really sorry.  
I can't change the past… but I promise I'll do better from now on.  
<br><br>
Can you forgive me? 🥺❤️
</p>

<button id="yes" onclick="accepted()">YES ❤️</button>
<button id="no" onclick="move()">🫣 No</button>

<p id="response"></p>

<div id="celebration">
🎉🥳💖🎊✨💃
</div>

</div>

<script>

let noClicks = 0;

function move(){

noClicks++;

let btn = document.getElementById("no");

let x = (Math.random()*80)-40;
let y = (Math.random()*40)-20;

btn.style.transform = `translate(${x}px,${y}px)`;

/* after 3 no clicks automatically accept */

if(noClicks >= 3){
accepted();
}

}

function accepted(){

document.getElementById("response").innerHTML =
"Wait wait… you said yes? 😳❤️<br>Okay… I promise to use my brain next time 😅";

document.getElementById("celebration").style.display = "block";

/* hide buttons */

document.getElementById("yes").style.display="none";
document.getElementById("no").style.display="none";

}

/* floating hearts */

setInterval(function(){

const heart = document.createElement("div");
heart.className = "heart";

const hearts = ["❤️","💓","💖","💗","💕"];
heart.innerHTML = hearts[Math.floor(Math.random()*hearts.length)];

heart.style.left = Math.random()*100 + "vw";
heart.style.fontSize = (20 + Math.random()*20) + "px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},500);

</script>

</body>
</html>
