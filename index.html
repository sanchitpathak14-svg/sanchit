<!DOCTYPE html>
<html>
<head>
<title>A small question</title>

<style>
body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
margin:0;
}

.box{
background:rgba(0,0,0,0.35);
padding:40px;
border-radius:20px;
max-width:350px;
}

button{
padding:12px 25px;
font-size:16px;
border:none;
border-radius:10px;
margin:10px;
cursor:pointer;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:white;
color:black;
}
</style>
</head>

<body>

<div class="box">

<h2>A small question for you…</h2>

<p>
I know I made mistakes and hurt you.<br><br>
I'm truly sorry for that.<br><br>
Can we fix this together?
</p>

<button id="yes" onclick="yes()">YES ❤️</button>
<button id="no" onmouseover="move()">NO</button>

</div>

<script>

function yes(){
alert("Thank you… that really means a lot ❤️");
}

function move(){
let x=Math.random()*300;
let y=Math.random()*300;

let btn=document.getElementById("no");

btn.style.position="absolute";
btn.style.left=x+"px";
btn.style.top=y+"px";
}

</script>

</body>
</html>
